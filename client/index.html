    rel="stylesheet">
  <title>Rare Atelier | Premium Streetwear</title>
  <script>
    // Blocking script to prevent Flash of Wrong Theme (FOIT)
    let isDark = false;
    try {
      isDark = localStorage.getItem("theme") === "dark" || (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);
    } catch (e) {}
    if (isDark) {
      document.documentElement.classList.add("dark");
    } else {
      document.documentElement.classList.remove("dark");
    }
  </script>
  <title>Rare Atelier | Premium Streetwear</title>
  <style>
    /* PRE-LOADER STYLES - Must be inline for instant rendering */
    #pre-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 1s cubic-bezier(0.77, 0, 0.175, 1), visibility 1s;
      color: white;
      font-family: 'Playfair Display', serif;
    }

    /* Prevent scrollbar during loading */
    body.loading {
      overflow: hidden !important;
      height: 100vh;
    }

    #pre-loader.loaded {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .loader-logo {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.5em; /* Reduced for better mobile fit */
      text-transform: uppercase;
      display: flex;
      justify-content: center;
      margin-bottom: 5px;
      height: 1.5rem;
    }

    .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      filter: blur(5px);
    }

    .letter.visible {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    .loader-bar-container {
      width: 175px; /* Manually adjusted to align from A to E */
      height: 1px;
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
      position: relative;
    }

    #loader-progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 1));
      transition: width 0.4s cubic-bezier(0.1, 0.5, 0.1, 1);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    .loader-status {
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-top: 12px;
      font-family: 'Inter', sans-serif;
    }



    /* Hide root until loaded to prevent flash of unstyled content */
    #root {
      opacity: 0;
      transition: opacity 1s ease;
    }

    #root.ready {
      opacity: 1;
    }
  </style>
</head>

<body class="loading">
  <div id="pre-loader">
    <div class="loader-content">
      <div class="loader-logo" id="brand-loader"></div>
      <div class="loader-bar-container">
        <div id="loader-progress"></div>
      </div>
      <div class="loader-status">
        Loading
      </div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    // Robust Loader Implementation
    var finishLoading; // Global for the skip button
    
    (function() {
      var loader = document.getElementById('pre-loader');
      var progress = document.getElementById('loader-progress');
      var root = document.getElementById('root');
      var brandContainer = document.getElementById('brand-loader');
      var body = document.body;
      
      var BRAND_NAME = "RARE ATELIER";
      var currentProgress = 0;
      var interval;

      // Setup letters
      var chars = BRAND_NAME.split('');
      for (var i = 0; i < chars.length; i++) {
        var span = document.createElement('span');
        var char = chars[i];
        span.className = char === ' ' ? '' : 'letter';
        span.textContent = char === ' ' ? '\u00A0' : char;
        brandContainer.appendChild(span);
      }
      
      var letters = brandContainer.querySelectorAll('.letter');

      function updateUI(prog) {
        if (!progress) return;
        progress.style.width = prog + '%';
        
        var revealThreshold = Math.floor((prog / 100) * letters.length);
        for (var j = 0; j < letters.length; j++) {
          if (j < revealThreshold) {
            letters[j].classList.add('visible');
          }
        }
      }

      function startSimulatedProgress() {
        interval = setInterval(function() {
          if (currentProgress < 90) {
            currentProgress += Math.random() * 5;
            if (currentProgress > 90) currentProgress = 90;
            updateUI(currentProgress);
          }
        }, 150);
      }

      finishLoading = function() {
        if (!loader || loader.classList.contains('loaded')) return;
        
        clearInterval(interval);
        updateUI(100);
        
        setTimeout(function() {
          loader.classList.add('loaded');
          root.classList.add('ready');
          
          setTimeout(function() {
            body.classList.remove('loading');
            // Cleanup loader from DOM after fade out
            setTimeout(function() {
              if (loader.parentNode) loader.parentNode.removeChild(loader);
            }, 1000);
          }, 800);
        }, 600);
      };

      // Start the progress
      startSimulatedProgress();

      // Finalize on full load
      // The React app is now responsible for calling this when ready (Hydration-First)
      window.finishLoading = finishLoading;

      // Extended Safety timeout (10s) in case React fails
      setTimeout(finishLoading, 10000);
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
