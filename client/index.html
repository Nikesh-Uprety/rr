  <title>Rare Atelier | Premium Streetwear</title>
  <script>
    // Apply theme class before React mounts to avoid flash.
    (function () {
      var root = document.documentElement;
      var theme = "light";
      try {
        var saved = localStorage.getItem("theme");
        if (saved === "dark" || saved === "light") {
          theme = saved;
        } else {
          var hour = new Date().getHours();
          theme = hour >= 6 && hour < 18 ? "light" : "dark";
        }
      } catch (e) {}

      root.classList.toggle("dark", theme === "dark");
      root.style.colorScheme = theme;
    })();
  </script>
  <style>
    /* Prevent white flash before any CSS loads by forcing dark background immediately */
    html {
      background-color: #050505;
    }

    /* PRE-LOADER STYLES - Must be inline for instant rendering */
    #pre-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 1s cubic-bezier(0.77, 0, 0.175, 1), visibility 1s;
      color: white;
      font-family: 'Playfair Display', serif;
    }

    /* Prevent scrollbar during loading */
    body.loading {
      overflow: hidden !important;
      height: 100vh;
    }

    #pre-loader.loaded {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .loader-logo {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.5em; /* Reduced for better mobile fit */
      text-transform: uppercase;
      display: flex;
      justify-content: center;
      margin-bottom: 5px;
      height: 1.5rem;
    }

    .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      filter: blur(5px);
    }

    .letter.visible {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    .loader-bar-container {
      width: 175px; /* Manually adjusted to align from A to E */
      height: 1px;
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
      position: relative;
    }

    #loader-progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 1));
      transition: width 0.4s cubic-bezier(0.1, 0.5, 0.1, 1);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    .loader-status {
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-top: 12px;
      font-family: 'Inter', sans-serif;
    }



    /* Hide root until loaded to prevent flash of unstyled content */
    #root {
      opacity: 0;
      transition: opacity 1s ease;
    }

    #root.ready {
      opacity: 1;
    }
  </style>
</head>

<body class="loading">
  <div id="pre-loader">
    <div class="loader-content">
      <div class="loader-logo" id="brand-loader"></div>
      <div class="loader-bar-container">
        <div id="loader-progress"></div>
      </div>
      <div class="loader-status">
        Loading
      </div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    // Optimized Smooth Loader Implementation using requestAnimationFrame
    var finishLoading; // Global for the skip button
    
    (function() {
      var loader = document.getElementById('pre-loader');
      var progress = document.getElementById('loader-progress');
      var root = document.getElementById('root');
      var brandContainer = document.getElementById('brand-loader');
      var body = document.body;
      
      var BRAND_NAME = "RARE ATELIER";
      
      // Setup letters
      var chars = BRAND_NAME.split('');
      for (var i = 0; i < chars.length; i++) {
        var span = document.createElement('span');
        var char = chars[i];
        span.className = char === ' ' ? '' : 'letter';
        span.textContent = char === ' ' ? '\u00A0' : char;
        brandContainer.appendChild(span);
      }
      var letters = brandContainer.querySelectorAll('.letter');

      var animationId;
      var currentProgress = 0; // The actual visual value (0-100)
      var targetProgress = 0; // Where the visual value is animating towards
      var isFinishing = false; // Flag to indicate React is ready

      // Smooth easing function
      function lerp(start, end, amt) {
        return (1 - amt) * start + amt * end;
      }

      function updateUI() {
        if (!progress) return;
        
        // Progress the bar
        progress.style.width = currentProgress + '%';
        
        // Stagger the letters smoothly based on continuous visual progress
        var revealThreshold = (currentProgress / 100) * letters.length;
        for (var j = 0; j < letters.length; j++) {
          if (j < revealThreshold) {
            letters[j].classList.add('visible');
          }
        }
      }

      function loop() {
        // If not finishing, slowly increment the target to build suspense
        if (!isFinishing && targetProgress < 90) {
           targetProgress += 0.2; 
        }

        // Lerp towards the target smoothly (0.1 is the speed of easing)
        currentProgress = lerp(currentProgress, targetProgress, 0.1);
        
        updateUI();

        // If we are finishing and visual progress reaches 99.5%, trigger the exit
        if (isFinishing && currentProgress > 99.5) {
          progress.style.width = '100%';
          cancelAnimationFrame(animationId);
          completeLoadSequence();
          return;
        }

        animationId = requestAnimationFrame(loop);
      }

      function completeLoadSequence() {
        if (!loader || loader.classList.contains('loaded')) return;
        
        setTimeout(function() {
          loader.classList.add('loaded');
          root.classList.add('ready');
          
          setTimeout(function() {
            body.classList.remove('loading');
            // Cleanup loader from DOM after fade out
            setTimeout(function() {
              if (loader.parentNode) loader.parentNode.removeChild(loader);
            }, 1000);
          }, 800);
        }, 200);
      }

      finishLoading = function() {
        if (isFinishing || !loader || loader.classList.contains('loaded')) return;
        
        // React is ready! Accelerate the target to 100 immediately
        isFinishing = true;
        targetProgress = 100;
        
        // If we want it to close extremely fast, we can also speed up the lerp
        // by overriding the loop behavior in a timeout, but standard lerp looks smooth.
      };

      // Start the render loop
      animationId = requestAnimationFrame(loop);

      // The React app is now responsible for calling this when ready
      window.finishLoading = finishLoading;

      // Extended Safety timeout (5s) in case React fails entirely
      setTimeout(finishLoading, 5000);
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
